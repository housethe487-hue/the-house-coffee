<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 260" role="img" aria-labelledby="title desc">
  <title id="title">The House Coffee logo</title>
  <desc id="desc">Three leaves beside an open square frame with The House wordmark.</desc>
  <defs>
    <mask id="leafOneCut">
      <rect width="240" height="260" fill="black"/>
      <path d="M72 88C43 80 29 58 37 25C64 31 78 53 72 88Z" fill="white"/>
      <path d="M44 40C53 52 61 67 71 84" fill="none" stroke="black" stroke-width="4.2" stroke-linecap="round"/>
    </mask>
    <mask id="leafTwoCut">
      <rect width="240" height="260" fill="black"/>
      <path d="M75 88C76 54 94 33 125 34C120 64 101 82 75 88Z" fill="white"/>
      <path d="M113 44C98 55 87 69 77 85" fill="none" stroke="black" stroke-width="4.2" stroke-linecap="round"/>
    </mask>
    <mask id="leafThreeCut">
      <rect width="240" height="260" fill="black"/>
      <path d="M76 94C109 72 145 75 171 101C143 124 106 118 76 94Z" fill="white"/>
      <path d="M91 95C116 94 139 97 162 102" fill="none" stroke="black" stroke-width="4.5" stroke-linecap="round"/>
    </mask>
  </defs>

  <g fill="#11100f">
    <rect x="25" y="109" width="9" height="126" rx="0.6"/>
    <rect x="25" y="226" width="193" height="9" rx="0.6"/>
    <rect x="209" y="28" width="9" height="207" rx="0.6"/>
    <rect x="142" y="28" width="76" height="9" rx="0.6"/>

    <rect x="24" y="20" width="112" height="78" mask="url(#leafOneCut)"/>
    <rect x="58" y="26" width="82" height="70" mask="url(#leafTwoCut)"/>
    <rect x="68" y="67" width="112" height="67" mask="url(#leafThreeCut)"/>
  </g>

  <g fill="#11100f" font-family="Arial, Helvetica, sans-serif">
    <text x="66" y="157" font-size="33" font-weight="700" letter-spacing=".5">THE</text>
    <text x="65" y="205" font-size="45" font-weight="700" letter-spacing="-1.8">HOUSE</text>
  </g>
</svg>
